<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoomixDev | Weaving Code, Delivering Excellence</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0b0f1a;
            --surface: #161b2b;
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --nav-bg: rgba(11, 15, 26, 0.85);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); color: var(--text-main); line-height: 1.6; overflow-x: hidden;
        }

        /* Nav & Layout */
        nav { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 8%; background: var(--nav-bg); backdrop-filter: blur(12px); 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border); 
        }
        .logo { font-size: 1.3rem; font-weight: 700; }
        .logo span { color: var(--primary); }
        .nav-links { list-style: none; display: flex; gap: 25px; }
        .nav-links a { text-decoration: none; color: var(--text-dim); font-size: 0.85rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }

        section { padding: 80px 8%; }
        .section-header { margin-bottom: 50px; }
        .section-header h2 { font-size: 2rem; font-weight: 700; }
        .section-header h2 span { color: var(--primary); }
        .section-header .line { width: 50px; height: 4px; background: var(--primary); border-radius: 2px; margin-top: 10px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }

        /* Card System */
        .card { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 20px; 
            padding: 25px; transition: 0.4s ease; display: flex; flex-direction: column; height: 100%; 
        }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 15px 35px rgba(0,0,0,0.3); }
        
        .card-img { width: 100%; height: 160px; background: #1a2236; border-radius: 12px; margin-bottom: 20px; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .card-icon { width: 45px; height: 45px; background: var(--glass); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; color: var(--primary); font-size: 1.3rem; }
        
        .tag-container { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; }
        .tag { font-size: 0.65rem; padding: 4px 10px; background: rgba(0, 210, 255, 0.05); border: 1px solid rgba(0, 210, 255, 0.15); border-radius: 4px; color: var(--primary); font-weight: 700; }

        .btn { padding: 12px 25px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 0.85rem; transition: 0.3s; text-align: center; border: none; display: inline-block; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-outline { border: 1px solid var(--border); color: var(--text-main); margin-top: auto; width: fit-content; }
        
        .install-guide { background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; margin-bottom: 15px; border-left: 3px solid var(--primary); font-size: 0.75rem; color: var(--text-dim); }

        footer { padding: 60px 8%; background: #080c14; border-top: 1px solid var(--border); text-align: center; }
        .social-links { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .social-links a { width: 42px; height: 42px; border-radius: 50%; background: var(--surface); display: flex; align-items: center; justify-content: center; color: var(--text-main); transition: 0.3s; border: 1px solid var(--border); }
        .social-links a:hover { background: var(--primary); color: #000; transform: translateY(-5px); }

        @media (max-width: 768px) { section { padding: 60px 5%; } .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Loomix<span>Dev</span></div>
        <ul class="nav-links">
            <li><a href="#apps">Apps</a></li>
            <li><a href="#projects">Projects</a></li>
            <li><a href="#packages">Packages</a></li>
            <li><a href="#blog">Blog</a></li>
        </ul>
    </nav>

    <section id="apps">
        <div class="section-header">
            <h2>Product <span>Showcase</span></h2>
            <div class="line"></div>
        </div>
        <div class="grid" id="apps-list"></div>
    </section>

    <section id="projects" style="background: #0d121f;">
        <div class="section-header">
            <h2>Featured <span>Projects</span></h2>
            <div class="line"></div>
        </div>
        <div class="grid" id="projects-list"></div>
    </section>

    <section id="packages">
        <div class="section-header">
            <h2>Flutter <span>Packages</span></h2>
            <div class="line"></div>
        </div>
        <div class="grid" id="packages-list"></div>
    </section>

    <section id="blog" style="background: #0d121f;">
        <div class="section-header">
            <h2>Loomix <span>Insights</span></h2>
            <div class="line"></div>
        </div>
        <div class="grid" id="blog-list"></div>
    </section>

    <footer>
        <div class="social-links">
            <a href="https://github.com/oxfaysal" target="_blank"><i class="fab fa-github"></i></a>
            <a href="mailto:loomixdev@gmail.com"><i class="fas fa-envelope"></i></a>
            <a href="https://t.me/your_telegram" target="_blank"><i class="fab fa-telegram"></i></a>
            <a href="https://wa.me/+8801833732555" target="_blank"><i class="fab fa-whatsapp"></i></a>
        </div>
        <p style="font-size: 0.75rem; color: var(--text-dim);">&copy; 2026 <strong>LoomixDev</strong>. All rights reserved.</p>
    </footer>

    <script>
        // ==========================
        // 1. APPS DATA (APK/Install)
        // ==========================
        const appData = [
            {
                name: "SebaXpress",
                desc: "Emergency services, blood donation, and ambulance directory.",
                img: "https://via.placeholder.com/400x200/161b2b/00d2ff?text=SebaXpress",
                apk: "https://t.me/your_telegram", // Link to APK or Telegram
                guide: "Download APK → Open File → Enable Unknown Sources → Install."
            },
            {
                name: "DutyTracker",
                desc: "Manage and calculate overtime work hours with precision.",
                img: "https://via.placeholder.com/400x200/161b2b/00d2ff?text=DutyTracker",
                apk: "https://oxfaysal.github.io/assets/apks/dutytrack.apk",
                guide: "Click Download → Follow system installation prompts."
            }
        ];

        // ==========================
        // 2. PROJECTS DATA (GitHub)
        // ==========================
        const projectData = [
            { name: "Open Fashion", desc: "E-commerce UI/UX kit for fashion stores.", tags: ["Flutter", "UI Kit"], link: "https://github.com/oxfaysal/open_fashion" },
            { name: "Fruit Hub", desc: "Vibrant fruit delivery app with clean animations.", tags: ["Dart", "Mobile"], link: "https://github.com/oxfaysal/fruit_hub" }
        ];

        // ==========================
        // 3. PACKAGES DATA (Pub.dev)
        // ==========================
        const packageData = [
            { name: "bangla_fonts", desc: "Load 20+ Bangla fonts dynamically from CDN.", tags: ["Typography", "CDN"], link: "https://pub.dev/packages/bangla_fonts" },
            { name: "custom_masonry_grid", desc: "Responsive masonry layout for Flutter.", tags: ["Layout", "UI"], link: "https://pub.dev/packages/custom_masonry_grid" }
        ];

        // ==========================
        // 4. BLOG DATA
        // ==========================
        const blogData = [
            { date: "Mar 22, 2026", title: "Flutter Performance Tips", excerpt: "How to maintain 60FPS in complex UIs...", link: "#" },
            { date: "Mar 10, 2026", title: "Why We Built LoomixDev", excerpt: "Our vision for the future of mobile apps...", link: "#" }
        ];

        // --- AUTOMATION LOGIC ---
        function renderAll() {
            // Render Apps
            document.getElementById('apps-list').innerHTML = appData.map(app => `
                <div class="card">
                    <div class="card-img"><img src="${app.img}" alt="${app.name}"></div>
                    <h3>${app.name}</h3>
                    <p style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 15px;">${app.desc}</p>
                    <div class="install-guide"><strong>Guide:</strong> ${app.guide}</div>
                    <a href="${app.apk}" class="btn btn-primary" style="margin-top:auto"><i class="fas fa-download"></i> Download APK</a>
                </div>
            `).join('');

            // Render Projects
            document.getElementById('projects-list').innerHTML = projectData.map(p => `
                <div class="card">
                    <div class="card-icon"><i class="fab fa-github"></i></div>
                    <h3>${p.name}</h3>
                    <p style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 15px;">${p.desc}</p>
                    <div class="tag-container">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                    <a href="${p.link}" target="_blank" class="btn btn-outline">GITHUB <i class="fas fa-code-branch"></i></a>
                </div>
            `).join('');

            // Render Packages
            document.getElementById('packages-list').innerHTML = packageData.map(pkg => `
                <div class="card">
                    <div class="card-icon"><i class="fas fa-box"></i></div>
                    <h3>${pkg.name}</h3>
                    <p style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 15px;">${pkg.desc}</p>
                    <div class="tag-container">${pkg.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                    <a href="${pkg.link}" target="_blank" class="btn btn-outline">PUB.DEV <i class="fas fa-external-link-alt"></i></a>
                </div>
            `).join('');

            // Render Blogs
            document.getElementById('blog-list').innerHTML = blogData.map(b => `
                <div class="card">
                    <span style="font-size: 0.7rem; color: var(--primary); font-weight: 700;">${b.date}</span>
                    <h3 style="margin-top: 10px;">${b.title}</h3>
                    <p style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 15px;">${b.excerpt}</p>
                    <a href="${b.link}" class="btn btn-outline">Read More</a>
                </div>
            `).join('');
        }

        window.onload = renderAll;
    </script>
</body>
</html>
